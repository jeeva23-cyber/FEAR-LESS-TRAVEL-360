<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | FearLess Travel 360</title>
  <!-- Google Fonts Poppins -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- AOS Animation Library CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
  <!-- Global & Landing Stylesheet -->
  <link rel="stylesheet" href="css/style.css">
  <!-- Auth Forms Custom Style -->
  <link rel="stylesheet" href="css/login.css">
</head>
<body>

  <!-- Sticky Header -->
  <header>
    <div class="container nav-container">
      <a href="index.html" class="logo">
        <i class="fa-solid fa-shield-halved"></i> FearLess <span>Travel 360</span>
      </a>
      
      <ul class="nav-menu" id="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="about.html" class="nav-link">About</a></li>
        <li><a href="index.html#services" class="nav-link">Services</a></li>
        <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
        
        <li class="nav-auth-mobile">
          <a href="login.html" class="btn btn-outline active">Login</a>
          <a href="register.html" class="btn btn-primary">Register</a>
        </li>
      </ul>

      <div class="nav-auth">
        <a href="login.html" class="btn btn-outline active">Login</a>
        <a href="register.html" class="btn btn-primary">Register</a>
      </div>

      <button class="hamburger" id="hamburger-btn">
        <i class="fa-solid fa-bars"></i>
      </button>
    </div>
  </header>

  <!-- Login Form Wrapper -->
  <main class="auth-wrapper">
    <div class="auth-container" data-aos="zoom-in" data-aos-duration="600">
      <div class="auth-card glass-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Login to sync your GPS tracking and digital safety passport</p>
        </div>

        <form id="login-form" novalidate>
          <!-- Email Field -->
          <div class="form-group">
            <label class="form-label" for="login-email">Email Address</label>
            <div class="input-wrapper">
              <input type="email" id="login-email" class="form-control" placeholder="tourist@example.com" required>
              <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
            </div>
            <span class="error-message">Please enter a valid email</span>
          </div>

          <!-- Password Field -->
          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="login-password" class="form-control" placeholder="••••••••" required>
              <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
            </div>
            <span class="error-message">Password is required</span>
          </div>

          <!-- Form Options -->
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="login-remember">
              <span>Remember Me</span>
            </label>
            <a href="#" class="forgot-link" onclick="Swal.fire('Forgot Password?', 'For Smart India Hackathon demonstration: Use tourist@example.com / password123, or admin@sih.gov.in / admin123', 'info')">Forgot Password?</a>
          </div>

          <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have a passport? <a href="register.html">Register Now</a>
        </div>
      </div>
    </div>
  </main>

  <!-- SweetAlert2 library -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- AOS animation JS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>
  <script>
    AOS.init({ once: true });
  </script>
  <!-- Main application script -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
  <!-- Login script -->
  <script src="js/login.js"></script>
</body>
</html>
